<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crownland Camping</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#2e5e3e;
color:white;
text-align:center;
padding:20px;
}

.controls{
padding:10px;
text-align:center;
background:#eee;
}

#map{
height:60vh;
}

#list{
padding:20px;
background:white;
}

.spot{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.spot a{
color:#2e5e3e;
font-weight:bold;
text-decoration:none;
}

footer{
background:#1f3d2a;
color:white;
text-align:center;
padding:20px;
}

button{
margin:5px;
padding:8px 12px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>🌲 Crownland Camping Best Spots</h1>
<p>Tap a pin to open Google Maps navigation</p>
</header>

<div class="controls">

<select id="areaFilter">
<option value="All">All Areas</option>
<option value="Burnt Timber">Burnt Timber</option>
<option value="Dutch Creek">Dutch Creek</option>
<option value="Indian Graves">Indian Graves</option>
<option value="Porcupine Hills">Porcupine Hills</option>
<option value="Waiporous">Waiporous</option>
</select>

<button onclick="locateUser()">Find Camping Near Me</button>
<button onclick="showNearest()">Show Nearest Campsites</button>

</div>

<div id="map"></div>

<div id="list">
<h2>Camping Coordinates</h2>
<div id="spotList"></div>
</div>

<footer>
<p>Website Copyright Created by:<br>
<strong>Rigsson Lagonera</strong></p>

<p>Camping Spots are all thanks to:<br>
<strong>Ryan Epp</strong></p>
</footer>

<script>

/* USE YOUR FULL SPOTS LIST */
const spots = window.spots || [];

/* MAP */

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
);

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
);

const map = L.map('map',{
center:[51,-114.5],
zoom:7,
layers:[street]
});

L.control.layers({
"Map":street,
"Satellite":satellite
}).addTo(map);

let cluster = L.markerClusterGroup();
let userLocation = null;
let markers = [];

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return (R*c);

}

/* MARKERS */

spots.forEach((spot)=>{

const marker=L.marker([spot.lat,spot.lng]);

markers.push({spot,marker});

marker.bindPopup(`
<b>${spot.area}</b>
<br><br>
<a target="_blank"
href="https://www.google.com/maps?q=${spot.lat},${spot.lng}">
Open in Google Maps
</a>
`);

cluster.addLayer(marker);

});

map.addLayer(cluster);

/* USER LOCATION */

function locateUser(){

navigator.geolocation.getCurrentPosition((pos)=>{

userLocation={
lat:pos.coords.latitude,
lng:pos.coords.longitude
};

map.setView([userLocation.lat,userLocation.lng],10);

L.marker([userLocation.lat,userLocation.lng])
.addTo(map)
.bindPopup("You are here")
.openPopup();

renderList();

});

}

/* SHOW NEAREST CAMPS */

function showNearest(){

if(!userLocation){
alert("Click 'Find Camping Near Me' first");
return;
}

const sorted=[...markers].sort((a,b)=>{

const da=getDistance(userLocation.lat,userLocation.lng,a.spot.lat,a.spot.lng);
const db=getDistance(userLocation.lat,userLocation.lng,b.spot.lat,b.spot.lng);

return da-db;

});

const nearest=sorted.slice(0,10);

cluster.clearLayers();

nearest.forEach((item)=>{

const d=getDistance(userLocation.lat,userLocation.lng,item.spot.lat,item.spot.lng).toFixed(1);

item.marker.bindPopup(`
<b>${item.spot.area}</b>
<br>${d} km away
<br><br>
<a target="_blank"
href="https://www.google.com/maps?q=${item.spot.lat},${item.spot.lng}">
Open in Google Maps
</a>
`);

cluster.addLayer(item.marker);

});

map.addLayer(cluster);

const group = new L.featureGroup(nearest.map(i=>i.marker));
map.fitBounds(group.getBounds(),{padding:[50,50]});

}

/* LIST */

function renderList(){

const filter=document.getElementById("areaFilter").value;
const container=document.getElementById("spotList");

container.innerHTML="";

spots.forEach((spot)=>{

if(filter!=="All" && spot.area!==filter) return;

let distance="";

if(userLocation){
distance=` • ${getDistance(userLocation.lat,userLocation.lng,spot.lat,spot.lng).toFixed(1)} km`;
}

const div=document.createElement("div");
div.className="spot";

div.innerHTML=`
<b>${spot.area}</b><br>
${spot.lat}, ${spot.lng}${distance}<br>
<a target="_blank"
href="https://www.google.com/maps?q=${spot.lat},${spot.lng}">
Open in Google Maps
</a>
`;

container.appendChild(div);

});

}

document.getElementById("areaFilter")
.addEventListener("change",renderList);

renderList();

</script>

</body>
</html>
