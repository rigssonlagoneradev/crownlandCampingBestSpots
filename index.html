<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crownland Camping Best Spots</title>

<link rel="stylesheet" href="style.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

</head>

<body>

<header>
<h1>🌲 Crownland Camping Best Spots</h1>
<p>Tap a pin to open Google Maps navigation</p>
</header>

<div class="controls">

<select id="areaFilter">
<option value="All">All Areas</option>
<option value="Burnt Timber">Burnt Timber</option>
<option value="Dutch Creek">Dutch Creek</option>
<option value="Indian Graves">Indian Graves</option>
<option value="Porcupine Hills">Porcupine Hills</option>
<option value="Waiporous">Waiporous</option>
</select>

<button onclick="locateUser()">Find Camping Near Me</button>

</div>

<div id="map"></div>

<footer>
<div class="footer-content">
<p>Website Copyright Created by:<br>
<strong>Rigsson Lagonera</strong></p>

<p>Camping Spots are all thanks to:<br>
<strong>Ryan Epp</strong></p>
</div>
</footer>

<script src="spots.js"></script>

<script>

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
);

const satellite = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{maxZoom:17}
);

const map=L.map('map',{
center:[51,-114.5],
zoom:7,
layers:[street]
});

const baseMaps={
"Map":street,
"Terrain":satellite
};

L.control.layers(baseMaps).addTo(map);

let cluster = L.markerClusterGroup();

function loadSpots(area="All"){

cluster.clearLayers()

spots.forEach((spot)=>{

if(area !== "All" && spot.area !== area) return;

const marker=L.marker([spot.lat,spot.lng]);

let popupContent = `<b>${spot.area}</b>`;

if(spot.desc && spot.desc.trim() !== ""){
popupContent += `<br>${spot.desc}<br><br>`;
}else{
popupContent += `<br><br>`;
}

popupContent += `
<a target="_blank"
href="https://www.google.com/maps?q=${spot.lat},${spot.lng}">
Open in Google Maps
</a>
`;

marker.bindPopup(popupContent);

cluster.addLayer(marker);

})

map.addLayer(cluster)

}

loadSpots()

document.getElementById("areaFilter").addEventListener("change",(e)=>{
loadSpots(e.target.value)
})

function locateUser(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition((pos)=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

map.setView([lat,lng],10)

L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup()

})

}

</script>

</body>
</html>
